name: ALM Daily Refresh

on:
  push:
    paths:
      - 'input/raw_data.csv'

  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl pandas

      - name: Run ALM refresh
        run: |
          TODAY=$(date +'%d_%b_%Y')
          python scripts/alm_refresh.py \
            input/raw_data.csv \
            input/ALM_template.xlsx \
            output/ALM_${TODAY}_8AM_SGT.xlsx

      - name: Upload refreshed file as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ALM-refreshed-${{ github.run_number }}
          path: output/ALM_*_8AM_SGT.xlsx
          retention-days: 30

      - name: Commit output back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "Auto: ALM refresh $(date +'%d %b %Y')"
          git push
